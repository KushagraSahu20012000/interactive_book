name: Deploy HF Backend Space

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "Assets/sample books/environment - 5-10/**"
      - ".github/workflows/deploy-hf-backend-space.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-backend-space:
    runs-on: ubuntu-latest
    environment: hugging_face
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Deploy backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: kush20sahu
          HF_SPACE: bright-minds-backend
        run: |
          set -euo pipefail

          if [ -z "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN secret is not set"
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          WORKDIR="$(mktemp -d)"
          REPO_URL="https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}"

          git clone "$REPO_URL" "$WORKDIR"

          rsync -av --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".env" \
            "$GITHUB_WORKSPACE/backend/" "$WORKDIR/"

          mkdir -p "$WORKDIR/Assets/sample books"
          rsync -av --delete \
            "$GITHUB_WORKSPACE/Assets/sample books/environment - 5-10/" \
            "$WORKDIR/Assets/sample books/environment - 5-10/"

          cd "$WORKDIR"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Deploy backend from GitHub Actions (${GITHUB_SHA})"
            git push origin main
          else
            echo "No backend changes to deploy"
          fi
