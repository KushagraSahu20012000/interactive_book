name: Deploy HF Backend Space

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "Assets/sample books/environment - 5-10/**"
      - "Assets/sample books/Non-Duality 10-15/**"
      - "Assets/sample books/asthetics and design/**"
      - ".github/workflows/deploy-hf-backend-space.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-backend-space:
    runs-on: ubuntu-latest
    environment: hugging_face
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install rsync, git-lfs, and git-xet prerequisites
        run: sudo apt-get update && sudo apt-get install -y rsync git-lfs curl unzip

      - name: Install and configure Git Xet
        run: |
          set -euo pipefail
          git lfs install --skip-repo
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/huggingface/xet-core/refs/heads/main/git_xet/install.sh | sh
          git xet install
          git xet --version

      - name: Deploy backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: kush20sahu
          HF_SPACE: bright-minds-backend
        run: |
          set -euo pipefail

          if [ -z "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN secret is not set"
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          WORKDIR="$(mktemp -d)"
          REPO_URL="https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}"

          WHOAMI_STATUS="$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer ${HF_TOKEN}" https://huggingface.co/api/whoami-v2)"
          if [ "$WHOAMI_STATUS" != "200" ]; then
            echo "HF_TOKEN is invalid or expired (whoami-v2 status: ${WHOAMI_STATUS})"
            exit 1
          fi

          if ! git ls-remote "$REPO_URL" >/dev/null 2>&1; then
            echo "HF token does not have access to spaces/${HF_USERNAME}/${HF_SPACE}"
            echo "Use a WRITE token from the same HF account (or a collaborator with write access)."
            exit 1
          fi

          git clone "$REPO_URL" "$WORKDIR"

          rsync -av --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".env" \
            "$GITHUB_WORKSPACE/backend/" "$WORKDIR/"

          ASSETS_ROOT="Assets/sample books"
          if [ -d "$GITHUB_WORKSPACE/$ASSETS_ROOT" ]; then
            rm -rf "$WORKDIR/Assets"
            mkdir -p "$WORKDIR/$ASSETS_ROOT"

            for SAMPLE_DIR in "environment - 5-10" "Non-Duality 10-15" "asthetics and design"; do
              SRC_DIR="$GITHUB_WORKSPACE/$ASSETS_ROOT/$SAMPLE_DIR"
              DEST_DIR="$WORKDIR/$ASSETS_ROOT/$SAMPLE_DIR"
              if [ -d "$SRC_DIR" ]; then
                mkdir -p "$DEST_DIR"
                rsync -av --delete \
                  --exclude ".git" \
                  "$SRC_DIR/" "$DEST_DIR/"
              fi
            done
          else
            rm -rf "$WORKDIR/Assets"
          fi

          cd "$WORKDIR"

          git lfs track "*.png" "*.jpg" "*.jpeg" "*.webp" "*.gif" "*.mp3" "*.wav" "*.bin" || true
          git add .gitattributes || true
          git add --renormalize . || true

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Deploy backend from GitHub Actions (${GITHUB_SHA})"
            git push origin main
          else
            echo "No backend changes to deploy"
          fi
