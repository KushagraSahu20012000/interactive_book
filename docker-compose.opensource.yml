services:
  mongo:
    image: mongo:7
    container_name: bright-minds-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ai:
    build:
      context: ./ai_layer
    container_name: bright-minds-ai
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-openai/gpt-oss-120b}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_API_KEY: ${HF_API_KEY:-}
      HF_PROVIDER: ${HF_PROVIDER:-nscale}
      HF_IMAGE_MODEL: ${HF_IMAGE_MODEL:-stabilityai/stable-diffusion-xl-base-1.0}
      IMAGE_SOURCE: ${IMAGE_SOURCE:-pexels}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
    ports:
      - "8000:8000"

  backend:
    build:
      context: ./backend
    container_name: bright-minds-backend
    restart: unless-stopped
    depends_on:
      - mongo
      - ai
    environment:
      PORT: 4000
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/bright_minds}
      AI_LAYER_URL: ${AI_LAYER_URL:-http://ai:8000}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8080}
      AI_POLL_INTERVAL_MS: ${AI_POLL_INTERVAL_MS:-1500}
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:4000}
    container_name: bright-minds-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo_data:
